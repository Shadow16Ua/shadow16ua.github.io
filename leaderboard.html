    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Roboto:wght@400;700&display=swap');

        :root {
            --accent-brass: #f0a500;
            --accent-copper: #c87533;
        }

        body {
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('Parlament.webp');
            background-attachment: fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 95%;
            margin: 40px auto;
            text-align: center;
        }

        h1 {
            font-family: 'Russo One', sans-serif;
            color: var(--accent-brass);
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-shadow: 0 0 20px rgba(240, 165, 0, 0.5);
            margin-bottom: 10px;
        }

        .leaderboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
            width: 100%;
        }

        /* КАРТКА ТОПУ */
        .top-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(240, 165, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
        }

        .top-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-brass);
        }

        .top-card h2 {
            font-family: 'Russo One', sans-serif;
            color: var(--accent-brass);
            font-size: 1.3rem;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(240, 165, 0, 0.3);
            padding-bottom: 10px;
        }

        /* ЕЛЕМЕНТ СПИСКУ */
        .leader-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border-left: 4px solid transparent;
        }

        .rank-1 { border-left-color: #ffd700; background: rgba(255, 215, 0, 0.1); }
        .rank-2 { border-left-color: #c0c0c0; background: rgba(192, 192, 192, 0.05); }
        .rank-3 { border-left-color: #cd7f32; background: rgba(205, 127, 50, 0.05); }

        .player-info, .stats-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nick { font-weight: bold; font-size: 1rem; }
        .value { font-family: 'Russo One', sans-serif; color: var(--accent-brass); min-width: 70px; text-align: right; }

        /* АНІМОВАНИЙ СТРЕЙК (ВОГОНЬ) */
        .streak-fire {
            font-weight: bold;
            color: #ff8c00;
            text-shadow: 0 0 8px rgba(255, 69, 0, 0.4);
            /* Збільшуємо час з 1.5s до 2.5s, щоб він палав повільніше */
            animation: fire-flicker 2.5s infinite ease-in-out; 
            display: inline-block;
        }

        @keyframes fire-flicker {
            0% { 
                transform: scale(1); 
                filter: brightness(1); 
            }
            50% { 
                /* Зменшуємо розширення з 1.15 до 1.05 */
                transform: scale(1.05); 
                /* Зменшуємо яскравість з 1.4 до 1.15 */
                filter: brightness(1.15) drop-shadow(0 0 5px #ff4500); 
            }
            100% { 
                transform: scale(1); 
                filter: brightness(1); 
            }
        }

        /* ДИНАМІКА (ТРЕНД) */
        .trend { font-size: 0.8rem; font-weight: bold; }
        .trend.up { color: #44ff44; }
        .trend.down { color: #ff4444; }
        .trend.steady { color: #666; }

        .back-btn {
            margin-top: 30px;
            display: inline-block;
            color: var(--accent-brass);
            text-decoration: none;
            font-weight: bold;
            font-family: 'Russo One';
            border: 1px solid var(--accent-brass);
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent-brass); color: #000; }
    </style>
</head>
<body>

        <h1>🏆 ЗАЛА СЛАВИ</h1>
        <p style="color: var(--accent-copper); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Легенди сервера AfterLight</p>

        <div id="main-grid" class="leaderboard-grid">

    <script>
        // ДАНІ (Обов'язково з streak та trend!)
        const leaderboardData = [
            {
                title: "⚔️ ТОП ВБИВСТВ",
                players: [
                    { name: "SegFaulted19", value: "606", streak: 3, trend: ""},
                    { name: "Blendy", value: "553", streak: 3, trend: "" },
                    { name: "Mourang", value: "343", streak: , trend: "up" }
                ]
            },
            {
                title: "💀 Топ Смертей",
                players: [
                    { name: "Blendy", value: "430", streak: 3, trend: ""},
                    { name: "Alextimcuk20", value: "391", streak: 1, trend: ""},
					{ name: "kiriewka", value: "344", streak: 2, trend: ""},
                ]
            },
            {
                title: "⏳ Награний час",
                players: [
                    { name: "Blendy", value: "12днів 9г", streak: 3, trend: "" },
					{ name: "Alextimcuk20", value: "10днів 10г",  streak: 1, trend: ""},
                    { name: "ronin_Boronin1", value: "10днів 3г", streak: 1, trend: ""},
                ]
            },
            {
                title: "🗺️ Топ Мандрівників",
                players: [
                    { name: "Blendy", value: "503к блоків", streak: 4, trend: ""},
                    { name: "brunoLOVE2727", value: "303к блоків", streak: 3, trend: ""},
                    { name: "Alextimcuk20", value: "271к блоків", streak: 1, trend: ""},
                ]
            },
            {
                title: "🏗️ Вбито мобів",
                players: [
                    { name: "BrockKE", value: "157к мобів", streak: 3, trend: ""},
                    { name: "salik", value: "40к мобів", streak: 3, trend: ""},
                    { name: "kiritotop3", value: "34к мобів", streak: 3, trend: ""}
                ]
            },
            {
                title: "Використано тотемів",
                players: [
					{ name: "Alextimcuk20", value: "407", streak: 1, trend: "" },
                    { name: "SegFaulted19", value: "303", streak: 1, trend: ""},
                    { name: "egyss", value: "177", streak: 3, trend: "" }, 
                ]
            }
        ];

        function renderLeaderboards() {
            const grid = document.getElementById('main-grid');
            if (!grid) return;
            grid.innerHTML = '';

            leaderboardData.forEach(category => {
                const card = document.createElement('div');
                card.className = 'top-card';
                
                let playersHTML = `<h2>${category.title}</h2>`;
                
                category.players.forEach((player, index) => {
                    const rankClass = index < 3 ? `rank-${index + 1}` : '';
                    
                    // Іконка тренду
                    let trendHTML = '';
                    if (player.trend === 'up') trendHTML = '<span class="trend up">▲</span>';
                    else if (player.trend === 'down') trendHTML = '<span class="trend down">▼</span>';
                    else trendHTML = '<span class="trend steady">—</span>';

                    // Анімований вогонь
                    const streakHTML = player.streak > 0 
                        ? `<span class="streak-fire">🔥 ${player.streak}</span>` 
                        : '<span style="opacity:0.2">🌑</span>';

                    playersHTML += `
                        <div class="leader-item ${rankClass}">
                            <div class="player-info">
                                <span class="nick">${index + 1}. ${player.name}</span>
                                ${trendHTML}
                            </div>
                            <div class="stats-info">
                                ${streakHTML}
                                <span class="value">${player.value}</span>
                            </div>
                        </div>
                    `;
                });

                card.innerHTML = playersHTML;
                grid.appendChild(card);
            });
        }

        // Виклик функції після повного завантаження сторінки
        document.addEventListener('DOMContentLoaded', renderLeaderboards);
    </script>
