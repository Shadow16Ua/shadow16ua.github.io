    <title>Економіка | AfterLight S1</title>
	<link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Parlament.webp');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-bar {
			width: 100%;
			padding: 15px 0; /* Прибираємо бокові паддінги для точного центру */
			background: rgba(0,0,0,0.5);
			display: flex;
			justify-content: space-between; /* Розподіляє: ліво - центр - право */
			align-items: center;
			border-bottom: 2px solid var(--accent-copper);
			position: sticky; 
			top: 0; 
			z-index: 1000;
		}

		/* Додаємо порожній блок справа для балансу */
		.nav-side-right {
			flex: 1;
		}

        .nav-logo { 
			position: absolute;
			top: 22px;
			left: 20px;
			width: 150px; /* Розмір логотипу */
			height: auto;
			z-index: 1000;
			transition: transform 0.3s ease;
		}
        .nav-logo:hover { filter: drop-shadow(0 0 8px var(--accent-brass)); }

        /* Контейнер */
        .container {
            max-width: 940px;
            width: 95%;
            margin: 40px auto;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
            text-align: center;
			background: rgba(255, 255, 255, 0.05) !important; /* Дуже тонка біла основа */
			backdrop-filter: blur(10px); /* Розмиття того, що ПІД контейнером */
			-webkit-backdrop-filter: blur(15px); /* Для iPhone/Safari */
			
			/* Латунна рамка зі світінням */
			border: 1px solid rgba(240, 165, 0, 0.3);
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Russo One', sans-serif;
            color: var(--accent-brass);
            font-size: 2.5rem;
            margin-top: 0;
            text-transform: uppercase;
        }

        /* Діаграма */
        .chart-wrapper {
			max-width: 850px; 
			width: 95%;
			height: 450px;
			margin: 30px auto; 
			border: 2px solid var(--accent-copper);
			border-radius: 8px;
			background: #333333; 
			overflow: hidden; /* Це важливо: воно відріже все, що вилізе за край */
			position: relative;
		}

		.chart-wrapper iframe {
			/* Робимо iframe ШИРШИМ за сам контейнер на 5% */
			width: 105% !important; 
			height: 100%;
			border: none;
			display: block;
			
			/* Зміщуємо вліво, щоб шкала цифр залишилась, а пустий край справа виліз за рамку */
			margin-left: 0; 
			
			/* Додатковий фікс: якщо справа все ще багато місця, 
			   можна додати трансформацію */
			transform: scaleX(1.04); 
			transform-origin: left;
		}
		
        /* Картки курсів */
        .exchange-rates {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .rate-card {
            background: var(--card-dark);
            border: 2px solid #555;
            padding: 25px;
            border-radius: 8px;
            min-width: 220px;
            transition: 0.3s;
        }

        .rate-card:hover {
            border-color: var(--accent-brass);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .rate-label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .rate-value {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            color: var(--accent-brass);
        }

        .rate-trend {
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: bold;
        }

        .up { color: #4caf50; }
        .down { color: #f44336; }

        /* Адаптивність */
        @media (max-width: 600px) {
            .corner-logo { display: none; }
            .container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            .rate-card { width: 100%; }
        }
		
		/* Звичайний стан підсвіченої картки */
		.highlight-card {
			border-color: var(--accent-brass) !important;
			box-shadow: 0 0 20px rgba(240, 165, 0, 0.4), 
						inset 0 0 10px rgba(240, 165, 0, 0.2);
			
			/* Встановлюємо початковий збільшений розмір */
			transform: scale(1.05) !important; 
			z-index: 2;
			background: rgba(60, 60, 60, 0.9) !important;
			animation: pulse-glow 3s infinite ease-in-out;
			transition: transform 0.3s ease, box-shadow 0.3s ease;
		}

		/* Стан при наведенні ТІЛЬКИ для підсвіченої картки */
		.highlight-card:hover {
			/* Робимо її ще трохи більшою або залишаємо такою ж, 
			   щоб вона не "стрибала" назад */
			transform: scale(1.1) !important; 
			box-shadow: 0 0 30px rgba(240, 165, 0, 0.6), 
						inset 0 0 15px rgba(240, 165, 0, 0.3);
		}

		.market-analysis {
		    margin-top: 50px;
		    width: 100%;
		    display: flex;
		    flex-direction: column;
		    align-items: center; /* Центрує заголовок і картки по горизонталі */
		    text-align: center;
		}
		
		.market-analysis h2 {
		    font-family: 'Russo One', sans-serif;
		    color: #fff;
		    font-size: 1.6rem;
		    margin-bottom: 25px;
		    display: flex;
		    align-items: center;
		    gap: 10px;
		    text-transform: uppercase;
		}
		
		.analysis-card {
		    background: rgba(30, 30, 30, 0.9); /* Темний фон як на скріншоті */
		    border-radius: 12px;
		    padding: 25px;
		    max-width: 600px;
		    width: 90%;
		    border: 1px solid rgba(255, 255, 255, 0.1);
		    border-left: 5px solid #4caf50; /* Зелена смужка зліва */
		    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
		}
		
		.analysis-card h3 {
		    font-family: 'Russo One', sans-serif;
		    font-size: 1.3rem;
		    color: #fff;
		    margin-bottom: 15px;
		    display: flex;
		    justify-content: center; /* Центрує назву монети */
		    align-items: center;
		    gap: 10px;
		}
		
		.analysis-card p {
		    color: #bbb;
		    font-size: 1rem;
		    line-height: 1.6;
		    margin: 0;
		}
		
		.analysis-card b {
		    color: #fff;
		}

		/* Адаптивність для мобілок */
		@media (max-width: 768px) {
		    .analysis-grid {
		        grid-template-columns: 1fr;
		    }
		}

		:root {
		    /* Додай до існуючих змінних */
		    --accent-diamond: #00e5ff; 
		    --diamond-glow: rgba(0, 229, 255, 0.4);
		}
		
		/* Спеціальна підсвічена Діамантова картка */
		.diamond-highlight {
		    border-color: var(--accent-diamond) !important;
		    box-shadow: 0 0 20px var(--diamond-glow), 
		                inset 0 0 10px rgba(0, 229, 255, 0.2) !important;
		    
		    transform: scale(1.05) !important; 
		    z-index: 2;
		    background: rgba(20, 40, 50, 0.9) !important; /* Темно-синій відтінок фону */
		    animation: diamond-pulse-glow 3s infinite ease-in-out !important;
		    transition: transform 0.3s ease, box-shadow 0.3s ease;
		}
		
		.diamond-highlight:hover {
		    transform: scale(1.1) !important; 
		    box-shadow: 0 0 35px var(--diamond-glow), 
		                inset 0 0 15px rgba(0, 229, 255, 0.3) !important;
		}
		
		/* Анімація для діамантового сяйва */
		@keyframes diamond-pulse-glow {
		    0% { box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
		    50% { box-shadow: 0 0 30px rgba(0, 229, 255, 0.6); }
		    100% { box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
		}
		
		/* Колір заголовків та значень для діамантів */
		.diamond-text {
		    color: var(--accent-diamond) !important;
		    text-shadow: 0 0 10px var(--diamond-glow);
		}
		
		/* Синя смужка для аналітики */
		.analysis-card.diamond-border {
		    border-left: 5px solid var(--accent-diamond) !important;
		}
    </style>
</head>
